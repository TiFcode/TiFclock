<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TiFpiano 🎹🐾</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; }

.header {
  text-align: center; padding: 8px 0 4px; width: 100%;
}
.header h1 { font-size: clamp(1.4rem, 4vw, 2rem); color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,.3); }
.header p { font-size: clamp(0.7rem, 2vw, 0.9rem); color: rgba(255,255,255,.85); margin-top: 2px; }

.controls {
  display: flex; gap: 8px; padding: 6px 12px; flex-wrap: wrap; justify-content: center; align-items: center;
}
.mode-btn {
  padding: 6px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,.5);
  background: rgba(255,255,255,.15); color: #fff; font-size: clamp(0.75rem, 2vw, 0.95rem);
  cursor: pointer; transition: all .2s; font-weight: 600;
}
.mode-btn.active { background: rgba(255,255,255,.9); color: #764ba2; border-color: #fff; transform: scale(1.05); }
.mode-btn:hover { background: rgba(255,255,255,.3); }

.stage {
  flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 6px 10px; overflow: hidden;
}

/* Piano keyboard */
.piano-wrap {
  width: 100%; max-width: 800px; position: relative; display: flex; flex-direction: column;
  align-items: center; gap: 8px;
}
.animal-display {
  font-size: clamp(3rem, 12vw, 6rem); height: clamp(60px, 14vw, 100px);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s; filter: drop-shadow(0 4px 8px rgba(0,0,0,.3));
}
.animal-display.pop { transform: scale(1.3) rotate(-5deg); }
.sound-label {
  font-size: clamp(0.8rem, 2.5vw, 1.1rem); color: rgba(255,255,255,.9);
  font-weight: 600; min-height: 1.4em; text-align: center;
}

.keyboard {
  display: flex; width: 100%; max-width: 700px; height: clamp(100px, 25vh, 200px);
  position: relative; gap: 3px; padding: 0 4px;
}
.key {
  flex: 1; border-radius: 0 0 12px 12px; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end; padding-bottom: 10px;
  cursor: pointer; transition: all .1s; position: relative;
  box-shadow: 0 4px 8px rgba(0,0,0,.2); font-weight: 700;
}
.key .note-label { font-size: clamp(0.65rem, 1.8vw, 0.9rem); opacity: .7; }
.key .key-emoji { font-size: clamp(1.2rem, 3.5vw, 2rem); margin-bottom: 4px; }
.key.white {
  background: linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
  color: #555; border: 1px solid #ddd;
}
.key.white:active, .key.white.pressed {
  background: linear-gradient(180deg, #e8e8ff 0%, #d0d0ff 100%);
  box-shadow: 0 1px 3px rgba(0,0,0,.2); transform: scaleY(.98);
}
.key.black {
  background: linear-gradient(180deg, #333 0%, #111 100%);
  color: #ccc; flex: 0.65; margin: 0 -1%; z-index: 2;
  height: 60%; align-self: flex-start; border-radius: 0 0 8px 8px;
  border: 1px solid #000;
}
.key.black:active, .key.black.pressed {
  background: linear-gradient(180deg, #444 0%, #222 100%);
  transform: scaleY(.97);
}

/* Song mode */
.song-area { text-align: center; width: 100%; max-width: 600px; }
.song-title { font-size: clamp(1rem, 3vw, 1.4rem); color: #fff; margin-bottom: 8px; font-weight: 700; }
.song-notes {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  margin-bottom: 12px; min-height: 50px;
}
.song-note {
  width: clamp(36px, 8vw, 50px); height: clamp(36px, 8vw, 50px);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: clamp(0.8rem, 2.2vw, 1.1rem); font-weight: 700;
  background: rgba(255,255,255,.2); color: #fff; border: 2px solid rgba(255,255,255,.3);
  transition: all .3s;
}
.song-note.done { background: #4CAF50; border-color: #66BB6A; transform: scale(1.1); }
.song-note.current { background: #FF9800; border-color: #FFB74D; animation: pulse-note .6s infinite; box-shadow: 0 0 15px rgba(255,152,0,.5); }
.song-note.wrong { background: #f44336; border-color: #ef5350; animation: shake .3s; }

.song-nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.song-pick {
  padding: 8px 16px; border-radius: 16px; border: none;
  background: rgba(255,255,255,.2); color: #fff; font-size: clamp(0.75rem, 2vw, 0.95rem);
  cursor: pointer; transition: all .2s; font-weight: 600;
}
.song-pick.active { background: #FF9800; }
.song-pick:hover { background: rgba(255,255,255,.35); }

/* Record mode */
.record-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
.rec-btn {
  padding: 8px 18px; border-radius: 20px; border: none; font-size: clamp(0.8rem, 2vw, 1rem);
  cursor: pointer; font-weight: 700; transition: all .2s;
}
.rec-btn.record { background: #f44336; color: #fff; }
.rec-btn.record.recording { animation: pulse-rec 1s infinite; }
.rec-btn.play { background: #4CAF50; color: #fff; }
.rec-btn.clear { background: rgba(255,255,255,.2); color: #fff; }

.note-count { color: rgba(255,255,255,.7); font-size: 0.8rem; margin-top: 4px; }

/* Particles */
.particle {
  position: fixed; pointer-events: none; font-size: 1.5rem;
  animation: float-up 1s ease-out forwards; z-index: 100;
}

@keyframes float-up {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.5) rotate(20deg); }
}
@keyframes pulse-note {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}
@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 0 0 rgba(244,67,54,.5); }
  50% { box-shadow: 0 0 0 10px rgba(244,67,54,0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Level indicator */
.level-info {
  display: flex; gap: 8px; align-items: center; margin-top: 4px;
}
.stars { color: #FFD700; font-size: clamp(0.9rem, 2.5vw, 1.2rem); }
.level-text { color: rgba(255,255,255,.8); font-size: clamp(0.7rem, 1.8vw, 0.85rem); }

/* Completion */
.complete-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
  align-items: center; justify-content: center; z-index: 200; opacity: 0;
  pointer-events: none; transition: opacity .3s;
}
.complete-overlay.show { opacity: 1; pointer-events: auto; }
.complete-box {
  background: #fff; border-radius: 24px; padding: 30px 40px; text-align: center;
  max-width: 90vw; box-shadow: 0 10px 40px rgba(0,0,0,.3);
}
.complete-box h2 { font-size: clamp(1.3rem, 4vw, 2rem); color: #764ba2; margin-bottom: 8px; }
.complete-box .big-emoji { font-size: 4rem; margin: 10px 0; }
.complete-box p { color: #666; font-size: clamp(0.85rem, 2.2vw, 1rem); margin-bottom: 16px; }
.complete-box button {
  padding: 10px 28px; border-radius: 20px; border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff; font-size: 1rem; cursor: pointer; font-weight: 700;
}
</style>
</head>
<body>

<div class="header">
  <h1>🎹 TiFpiano 🐾</h1>
  <p>Pian cu sunete de animale / Animal Sound Piano</p>
</div>

<div class="controls">
  <button class="mode-btn active" onclick="setMode('free')" id="mode-free">🎵 Liber / Free</button>
  <button class="mode-btn" onclick="setMode('song')" id="mode-song">🎶 Melodii / Songs</button>
  <button class="mode-btn" onclick="setMode('record')" id="mode-record">⏺️ Înregistrare / Record</button>
</div>

<div class="stage">
  <div class="piano-wrap">
    <div class="animal-display" id="animalDisplay">🎵</div>
    <div class="sound-label" id="soundLabel">Apasă o clapă! / Press a key!</div>
    
    <div id="songArea" class="song-area" style="display:none">
      <div class="song-title" id="songTitle"></div>
      <div class="song-notes" id="songNotes"></div>
      <div class="song-nav" id="songNav"></div>
      <div class="level-info">
        <span class="stars" id="starsDisplay"></span>
        <span class="level-text" id="levelText"></span>
      </div>
    </div>
    
    <div id="recordArea" style="display:none; text-align:center;">
      <div class="record-controls">
        <button class="rec-btn record" id="recBtn" onclick="toggleRecord()">⏺️ Rec</button>
        <button class="rec-btn play" onclick="playRecording()">▶️ Redă / Play</button>
        <button class="rec-btn clear" onclick="clearRecording()">🗑️ Șterge / Clear</button>
      </div>
      <div class="note-count" id="noteCount">0 note</div>
    </div>
    
    <div class="keyboard" id="keyboard"></div>
  </div>
</div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-box">
    <div class="big-emoji">🎉🎹</div>
    <h2 id="completeTitle">Bravo!</h2>
    <p id="completeMsg"></p>
    <button onclick="nextSong()">Următoarea / Next ➡️</button>
  </div>
</div>

<script>
// Audio context
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Notes & animals
const NOTES = [
  { note: 'Do', freq: 261.63, color: '#FF6B6B', animal: '🐱', sound: 'Miau!', soundRo: 'Pisica face miau!', type: 'white' },
  { note: 'Do#', freq: 277.18, color: '#FF8E8E', animal: '🦊', sound: 'Yip!', soundRo: 'Vulpea!', type: 'black' },
  { note: 'Re', freq: 293.66, color: '#FFA94D', animal: '🐶', sound: 'Ham!', soundRo: 'Câinele face ham!', type: 'white' },
  { note: 'Re#', freq: 311.13, color: '#FFB86E', animal: '🦝', sound: 'Chirp!', soundRo: 'Ratonul!', type: 'black' },
  { note: 'Mi', freq: 329.63, color: '#FFD93D', animal: '🐤', sound: 'Piu!', soundRo: 'Puișorul face piu!', type: 'white' },
  { note: 'Fa', freq: 349.23, color: '#6BCB77', animal: '🐸', sound: 'Oac!', soundRo: 'Broasca face oac!', type: 'white' },
  { note: 'Fa#', freq: 369.99, color: '#7ED88C', animal: '🦎', sound: 'Ssss!', soundRo: 'Șopârla!', type: 'black' },
  { note: 'Sol', freq: 392.00, color: '#4D96FF', animal: '🐮', sound: 'Mu!', soundRo: 'Vaca face mu!', type: 'white' },
  { note: 'Sol#', freq: 415.30, color: '#6EAAFF', animal: '🦉', sound: 'Uhu!', soundRo: 'Bufnița!', type: 'black' },
  { note: 'La', freq: 440.00, color: '#9B59B6', animal: '🐷', sound: 'Groh!', soundRo: 'Porcul face groh!', type: 'white' },
  { note: 'La#', freq: 466.16, color: '#AF6EC5', animal: '🦇', sound: 'Squeak!', soundRo: 'Liliacul!', type: 'black' },
  { note: 'Si', freq: 493.88, color: '#E84393', animal: '🐴', sound: 'Ihaha!', soundRo: 'Calul face ihaha!', type: 'white' },
  { note: 'Do₂', freq: 523.25, color: '#FD79A8', animal: '🦁', sound: 'Roar!', soundRo: 'Leul rage!', type: 'white' },
];

// Songs (using note indices 0-12)
const SONGS = [
  {
    name: '🌟 Twinkle Twinkle / Steluță',
    level: 1,
    notes: [0,0,7,7,9,9,7, 5,5,4,4,2,2,0, 7,7,5,5,4,4,2, 7,7,5,5,4,4,2, 0,0,7,7,9,9,7, 5,5,4,4,2,2,0]
  },
  {
    name: '🐑 Mary Had a Lamb / Mielușelul',
    level: 1,
    notes: [4,2,0,2,4,4,4, 2,2,2, 4,7,7, 4,2,0,2,4,4,4,4,2,2,4,2,0]
  },
  {
    name: '🎂 La mulți ani! / Happy Birthday',
    level: 2,
    notes: [0,0,2,0,5,4, 0,0,2,0,7,5, 0,0,12,9,5,4,2, 11,11,9,5,7,5]
  },
  {
    name: '🐸 Broaște / Frère Jacques',
    level: 2,
    notes: [0,2,4,0, 0,2,4,0, 4,5,7, 4,5,7, 7,9,7,5,4,0, 7,9,7,5,4,0, 0,7,0, 0,7,0]
  },
  {
    name: '🎵 Oda Bucuriei / Ode to Joy',
    level: 3,
    notes: [4,4,5,7,7,5,4,2,0,0,2,4,4,2,2, 4,4,5,7,7,5,4,2,0,0,2,4,2,0,0]
  },
  {
    name: '🐝 Albinuța / Flight (simplified)',
    level: 3,
    notes: [4,5,7,9,7,5,4,2,4,5,7,9,12,9,7,5,4,2,0,2,4,5,7,9,12]
  }
];

let currentMode = 'free';
let currentSongIdx = 0;
let songPosition = 0;
let isRecording = false;
let recording = [];
let recordStart = 0;
let completedSongs = new Set();

// Build keyboard
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  NOTES.forEach((n, i) => {
    const key = document.createElement('div');
    key.className = `key ${n.type}`;
    key.innerHTML = `<span class="key-emoji">${n.animal}</span><span class="note-label">${n.note}</span>`;
    key.dataset.idx = i;
    
    const startPlay = (e) => { e.preventDefault(); playNote(i); };
    key.addEventListener('pointerdown', startPlay);
    key.addEventListener('touchstart', startPlay, { passive: false });
    
    kb.appendChild(key);
  });
}

// Play a note
function playNote(idx) {
  ensureAudio();
  const n = NOTES[idx];
  
  // Synthesize sound - animal-like
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const gain2 = audioCtx.createGain();
  
  // Main tone
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(n.freq, now);
  osc.frequency.exponentialRampToValueAtTime(n.freq * 1.02, now + 0.05);
  osc.frequency.exponentialRampToValueAtTime(n.freq * 0.98, now + 0.15);
  gain.gain.setValueAtTime(0.35, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.5);
  
  // Harmonic for richness
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(n.freq * 2, now);
  gain2.gain.setValueAtTime(0.1, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc2.connect(gain2).connect(audioCtx.destination);
  osc2.start(now);
  osc2.stop(now + 0.3);
  
  // Visual feedback
  const display = document.getElementById('animalDisplay');
  const label = document.getElementById('soundLabel');
  display.textContent = n.animal;
  display.classList.remove('pop');
  void display.offsetWidth;
  display.classList.add('pop');
  label.textContent = `${n.note} - ${n.soundRo}`;
  
  // Key press animation
  const keys = document.querySelectorAll('.key');
  keys[idx].classList.add('pressed');
  setTimeout(() => keys[idx].classList.remove('pressed'), 200);
  
  // Particles
  spawnParticle(n.animal, keys[idx]);
  
  // Recording
  if (isRecording) {
    recording.push({ idx, time: Date.now() - recordStart });
    document.getElementById('noteCount').textContent = `${recording.length} note`;
  }
  
  // Song mode check
  if (currentMode === 'song') checkSongNote(idx);
}

function spawnParticle(emoji, fromEl) {
  const rect = fromEl.getBoundingClientRect();
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = emoji;
  p.style.left = rect.left + rect.width/2 - 12 + 'px';
  p.style.top = rect.top - 10 + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1000);
}

// Modes
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`mode-${mode}`).classList.add('active');
  
  document.getElementById('songArea').style.display = mode === 'song' ? 'block' : 'none';
  document.getElementById('recordArea').style.display = mode === 'record' ? 'block' : 'none';
  
  if (mode === 'song') loadSong(currentSongIdx);
  if (mode === 'record' && isRecording) toggleRecord();
  
  document.getElementById('soundLabel').textContent = 
    mode === 'free' ? 'Apasă o clapă! / Press a key!' :
    mode === 'song' ? 'Urmează notele! / Follow the notes!' :
    'Înregistrează-ți melodia! / Record your tune!';
}

// Song mode
function loadSong(idx) {
  currentSongIdx = idx;
  songPosition = 0;
  const song = SONGS[idx];
  
  document.getElementById('songTitle').textContent = song.name;
  
  // Render notes
  const container = document.getElementById('songNotes');
  container.innerHTML = '';
  song.notes.forEach((noteIdx, i) => {
    const el = document.createElement('div');
    el.className = 'song-note' + (i === 0 ? ' current' : '');
    el.textContent = NOTES[noteIdx].note;
    el.style.borderColor = NOTES[noteIdx].color;
    container.appendChild(el);
  });
  
  // Song picker
  const nav = document.getElementById('songNav');
  nav.innerHTML = '';
  SONGS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'song-pick' + (i === idx ? ' active' : '');
    const done = completedSongs.has(i) ? ' ✅' : '';
    btn.textContent = `${s.name.split(' ')[0]} Lvl ${s.level}${done}`;
    btn.onclick = () => loadSong(i);
    nav.appendChild(btn);
  });
  
  updateStars();
}

function checkSongNote(idx) {
  const song = SONGS[currentSongIdx];
  if (songPosition >= song.notes.length) return;
  
  const noteEls = document.querySelectorAll('.song-note');
  
  if (idx === song.notes[songPosition]) {
    noteEls[songPosition].classList.remove('current');
    noteEls[songPosition].classList.add('done');
    songPosition++;
    if (songPosition < song.notes.length) {
      noteEls[songPosition].classList.add('current');
      // Scroll into view
      noteEls[songPosition].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    } else {
      // Song complete!
      completedSongs.add(currentSongIdx);
      setTimeout(() => showComplete(), 300);
    }
  } else {
    // Wrong note
    noteEls[songPosition].classList.add('wrong');
    setTimeout(() => noteEls[songPosition].classList.remove('wrong'), 300);
  }
}

function showComplete() {
  const overlay = document.getElementById('completeOverlay');
  const song = SONGS[currentSongIdx];
  document.getElementById('completeTitle').textContent = 'Bravo! 🎉';
  document.getElementById('completeMsg').textContent = 
    `Ai cântat "${song.name}"! / You played "${song.name}"!`;
  overlay.classList.add('show');
  updateStars();
  
  // Celebration particles
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = ['🎵','🎶','⭐','🌟','✨','🎹'][Math.floor(Math.random()*6)];
      p.style.left = Math.random() * window.innerWidth + 'px';
      p.style.top = Math.random() * window.innerHeight * 0.5 + window.innerHeight * 0.3 + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }, i * 100);
  }
}

function nextSong() {
  document.getElementById('completeOverlay').classList.remove('show');
  const next = (currentSongIdx + 1) % SONGS.length;
  loadSong(next);
}

function updateStars() {
  const done = completedSongs.size;
  const total = SONGS.length;
  const stars = '⭐'.repeat(done) + '☆'.repeat(total - done);
  document.getElementById('starsDisplay').textContent = stars;
  document.getElementById('levelText').textContent = `${done}/${total} melodii / songs`;
}

// Record mode
function toggleRecord() {
  isRecording = !isRecording;
  const btn = document.getElementById('recBtn');
  if (isRecording) {
    recording = [];
    recordStart = Date.now();
    btn.classList.add('recording');
    btn.textContent = '⏹️ Stop';
    document.getElementById('noteCount').textContent = '0 note';
  } else {
    btn.classList.remove('recording');
    btn.textContent = '⏺️ Rec';
  }
}

function playRecording() {
  if (recording.length === 0) return;
  if (isRecording) toggleRecord();
  
  recording.forEach(r => {
    setTimeout(() => playNote(r.idx), r.time);
  });
}

function clearRecording() {
  recording = [];
  if (isRecording) toggleRecord();
  document.getElementById('noteCount').textContent = '0 note';
}

// Keyboard shortcuts
const KEY_MAP = { 'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,'k':12 };
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const idx = KEY_MAP[e.key.toLowerCase()];
  if (idx !== undefined) playNote(idx);
});

// Init
buildKeyboard();
</script>
</body>
</html>
