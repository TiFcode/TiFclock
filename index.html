<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TiFpaint 🎨🖌️</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ffd452 100%); display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; }

.header {
  text-align: center; padding: 6px 0 2px; width: 100%; flex-shrink: 0;
}
.header h1 { font-size: clamp(1.3rem, 3.5vw, 1.8rem); color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,.3); }
.header p { font-size: clamp(0.65rem, 1.8vw, 0.8rem); color: rgba(255,255,255,.85); margin-top: 1px; }

/* Toolbar */
.toolbar {
  display: flex; gap: 4px; padding: 4px 8px; flex-wrap: wrap; justify-content: center;
  align-items: center; width: 100%; max-width: 800px; flex-shrink: 0;
}
.tool-group {
  display: flex; gap: 3px; align-items: center; background: rgba(255,255,255,.15);
  border-radius: 16px; padding: 3px 6px;
}
.tool-btn {
  width: clamp(32px, 7vw, 42px); height: clamp(32px, 7vw, 42px);
  border-radius: 50%; border: 2px solid rgba(255,255,255,.4);
  background: rgba(255,255,255,.2); color: #fff; font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.tool-btn.active { background: rgba(255,255,255,.9); border-color: #fff; transform: scale(1.1); }
.tool-btn.active .btn-icon { filter: none; }
.tool-btn:hover { background: rgba(255,255,255,.35); }

.color-btn {
  width: clamp(26px, 5.5vw, 34px); height: clamp(26px, 5.5vw, 34px);
  border-radius: 50%; border: 2px solid rgba(255,255,255,.5);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
}
.color-btn.active { border: 3px solid #fff; transform: scale(1.2); box-shadow: 0 0 8px rgba(255,255,255,.6); }

.size-btn {
  width: clamp(30px, 6vw, 38px); height: clamp(30px, 6vw, 38px);
  border-radius: 50%; border: 2px solid rgba(255,255,255,.4);
  background: rgba(255,255,255,.2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.size-btn.active { background: rgba(255,255,255,.85); border-color: #fff; transform: scale(1.1); }
.size-dot {
  border-radius: 50%; background: #fff;
}
.size-btn.active .size-dot { background: #f5576c; }

/* Canvas area */
.canvas-wrap {
  flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
  padding: 4px 8px 8px; min-height: 0;
}
.canvas-container {
  position: relative; background: #fff; border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2), inset 0 0 0 3px rgba(0,0,0,.05);
  overflow: hidden; touch-action: none;
}
canvas {
  display: block; cursor: crosshair;
}

/* Stamp picker overlay */
.stamp-picker {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.stamp-picker.show { display: flex; }
.stamp-grid {
  background: #fff; border-radius: 20px; padding: 16px; max-width: 90vw; max-height: 80vh;
  overflow-y: auto; display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
}
.stamp-grid .cat-label {
  grid-column: 1 / -1; font-size: clamp(0.7rem, 2vw, 0.9rem);
  color: #888; font-weight: 700; padding: 4px 0 0; text-align: center;
}
.stamp-item {
  width: clamp(40px, 10vw, 56px); height: clamp(40px, 10vw, 56px);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(1.5rem, 5vw, 2.2rem); cursor: pointer;
  border-radius: 12px; transition: all .15s; background: #f8f8f8;
}
.stamp-item:hover, .stamp-item:active { background: #ffe0e8; transform: scale(1.15); }
.stamp-item.selected { background: #ffd0dd; border: 2px solid #f5576c; }

/* Background picker */
.bg-picker {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.bg-picker.show { display: flex; }
.bg-grid {
  background: #fff; border-radius: 20px; padding: 16px; max-width: 85vw;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
}
.bg-option {
  width: clamp(50px, 14vw, 70px); height: clamp(50px, 14vw, 70px);
  border-radius: 14px; cursor: pointer; border: 3px solid #eee;
  transition: all .15s;
}
.bg-option:hover, .bg-option.active { border-color: #f5576c; transform: scale(1.08); }

/* Save flash */
.save-flash {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,.7); color: #fff; padding: 16px 32px; border-radius: 16px;
  font-size: 1.2rem; font-weight: 700; z-index: 200; pointer-events: none;
}
.save-flash.show { display: block; animation: flashIn .6s ease-out forwards; }
@keyframes flashIn {
  0% { opacity: 0; transform: translate(-50%,-50%) scale(.7); }
  40% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
}

/* Undo counter */
.undo-badge {
  position: absolute; top: -4px; right: -4px; background: #f5576c; color: #fff;
  font-size: 0.55rem; width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-weight: 700;
}

/* Sparkle effect */
.sparkle {
  position: fixed; pointer-events: none; z-index: 50; font-size: 1.2rem;
  animation: sparkleAnim .6s ease-out forwards;
}
@keyframes sparkleAnim {
  0% { opacity: 1; transform: scale(0) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
  100% { opacity: 0; transform: scale(0.5) rotate(360deg) translateY(-30px); }
}
</style>
</head>
<body>

<div class="header">
  <h1>🎨 TiFpaint 🖌️</h1>
  <p>Desenează și creează! / Draw and create!</p>
</div>

<div class="toolbar">
  <!-- Tools -->
  <div class="tool-group">
    <button class="tool-btn active" data-tool="brush" title="Pensulă / Brush">🖌️</button>
    <button class="tool-btn" data-tool="eraser" title="Radieră / Eraser">🧹</button>
    <button class="tool-btn" data-tool="fill" title="Umplere / Fill">🪣</button>
    <button class="tool-btn" data-tool="stamp" title="Ștampile / Stamps">⭐</button>
    <button class="tool-btn" data-tool="spray" title="Spray">💨</button>
    <button class="tool-btn" data-tool="rainbow" title="Curcubeu / Rainbow">🌈</button>
  </div>

  <!-- Colors -->
  <div class="tool-group" id="colorGroup">
    <div class="color-btn active" data-color="#f5576c" style="background:#f5576c"></div>
    <div class="color-btn" data-color="#ffd452" style="background:#ffd452"></div>
    <div class="color-btn" data-color="#43e97b" style="background:#43e97b"></div>
    <div class="color-btn" data-color="#38f9d7" style="background:#38f9d7"></div>
    <div class="color-btn" data-color="#4facfe" style="background:#4facfe"></div>
    <div class="color-btn" data-color="#a855f7" style="background:#a855f7"></div>
    <div class="color-btn" data-color="#f093fb" style="background:#f093fb"></div>
    <div class="color-btn" data-color="#ff8a50" style="background:#ff8a50"></div>
    <div class="color-btn" data-color="#333333" style="background:#333333"></div>
    <div class="color-btn" data-color="#ffffff" style="background:#ffffff; border-color:#ccc"></div>
  </div>

  <!-- Sizes -->
  <div class="tool-group">
    <div class="size-btn" data-size="3"><div class="size-dot" style="width:6px;height:6px"></div></div>
    <div class="size-btn active" data-size="8"><div class="size-dot" style="width:10px;height:10px"></div></div>
    <div class="size-btn" data-size="16"><div class="size-dot" style="width:16px;height:16px"></div></div>
    <div class="size-btn" data-size="30"><div class="size-dot" style="width:22px;height:22px"></div></div>
  </div>

  <!-- Actions -->
  <div class="tool-group">
    <button class="tool-btn" data-action="undo" title="Înapoi / Undo" style="position:relative">↩️<span class="undo-badge" id="undoBadge" style="display:none">0</span></button>
    <button class="tool-btn" data-action="bg" title="Fundal / Background">🖼️</button>
    <button class="tool-btn" data-action="clear" title="Șterge tot / Clear">🗑️</button>
    <button class="tool-btn" data-action="save" title="Salvează / Save">💾</button>
  </div>
</div>

<div class="canvas-wrap">
  <div class="canvas-container" id="canvasContainer">
    <canvas id="drawCanvas"></canvas>
  </div>
</div>

<!-- Stamp Picker -->
<div class="stamp-picker" id="stampPicker">
  <div class="stamp-grid" id="stampGrid"></div>
</div>

<!-- Background Picker -->
<div class="bg-picker" id="bgPicker">
  <div class="bg-grid" id="bgGrid"></div>
</div>

<div class="save-flash" id="saveFlash">💾 Salvat! / Saved!</div>

<script>
(() => {
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('canvasContainer');

  // State
  let currentTool = 'brush';
  let currentColor = '#f5576c';
  let currentSize = 8;
  let currentStamp = '⭐';
  let isDrawing = false;
  let lastX = 0, lastY = 0;
  let rainbowHue = 0;
  let undoStack = [];
  const MAX_UNDO = 20;
  let bgColor = '#ffffff';

  // Stamps
  const stamps = {
    'Animale / Animals': ['🐶','🐱','🐰','🐻','🦊','🐸','🐵','🐷','🐮','🦁','🐯','🐨','🐼','🐧','🐔','🦄'],
    'Natură / Nature': ['🌸','🌻','🌺','🌷','🌹','🍀','🌲','🌴','☀️','🌙','⭐','🌈','☁️','❄️','💧','🔥'],
    'Mâncare / Food': ['🍎','🍊','🍋','🍇','🍓','🍌','🍕','🍩','🍦','🧁','🍪','🎂','🍉','🥕','🌽','🍄'],
    'Transport': ['🚗','🚕','🚌','🚒','🚑','✈️','🚀','🚂','⛵','🚁','🏍️','🚲','🛸','🎈','🪁','🏎️'],
    'Inimi & Fun': ['❤️','💛','💚','💙','💜','🧡','💖','💫','✨','🎉','🎊','🎁','🎵','🎶','💎','👑'],
  };

  // Backgrounds
  const backgrounds = [
    '#ffffff', '#fff8e1', '#e8f5e9', '#e3f2fd',
    '#fce4ec', '#f3e5f5', '#e0f7fa', '#fff3e0',
    '#f5f5f5', '#263238', '#1a237e', '#004d40',
  ];

  // -- Init --
  function resizeCanvas() {
    const wrap = document.querySelector('.canvas-wrap');
    const w = Math.min(wrap.clientWidth - 16, 800);
    const h = wrap.clientHeight - 8;
    canvas.width = w;
    canvas.height = h;
    container.style.width = w + 'px';
    container.style.height = h + 'px';
    redrawBg();
    // Restore last state if exists
    if (undoStack.length > 0) {
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 0, 0); };
      img.src = undoStack[undoStack.length - 1];
    }
  }

  function redrawBg() {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function saveUndo() {
    undoStack.push(canvas.toDataURL());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    updateUndoBadge();
  }

  function updateUndoBadge() {
    const badge = document.getElementById('undoBadge');
    if (undoStack.length > 0) {
      badge.style.display = 'flex';
      badge.textContent = undoStack.length;
    } else {
      badge.style.display = 'none';
    }
  }

  // -- Drawing functions --
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
      x: (t.clientX - rect.left) * (canvas.width / rect.width),
      y: (t.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  function startDraw(e) {
    e.preventDefault();
    if (currentTool === 'fill') {
      const pos = getPos(e);
      saveUndo();
      floodFill(Math.round(pos.x), Math.round(pos.y), currentColor);
      spawnSparkle(e);
      return;
    }
    if (currentTool === 'stamp') {
      const pos = getPos(e);
      saveUndo();
      drawStamp(pos.x, pos.y);
      spawnSparkle(e);
      return;
    }
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    saveUndo();
    // Draw a dot at start
    drawDot(pos.x, pos.y);
  }

  function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);

    if (currentTool === 'spray') {
      drawSpray(pos.x, pos.y);
    } else {
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = currentTool === 'eraser' ? bgColor :
                        currentTool === 'rainbow' ? `hsl(${rainbowHue}, 90%, 55%)` : currentColor;
      ctx.lineWidth = currentTool === 'eraser' ? currentSize * 3 : currentSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.globalAlpha = currentTool === 'rainbow' ? 0.8 : 1;
      ctx.stroke();
      ctx.globalAlpha = 1;
      if (currentTool === 'rainbow') rainbowHue = (rainbowHue + 3) % 360;
    }

    lastX = pos.x;
    lastY = pos.y;
  }

  function endDraw(e) {
    if (!isDrawing) return;
    isDrawing = false;
  }

  function drawDot(x, y) {
    ctx.beginPath();
    const s = currentTool === 'eraser' ? currentSize * 3 : currentSize;
    ctx.arc(x, y, s / 2, 0, Math.PI * 2);
    ctx.fillStyle = currentTool === 'eraser' ? bgColor :
                    currentTool === 'rainbow' ? `hsl(${rainbowHue}, 90%, 55%)` : currentColor;
    ctx.fill();
  }

  function drawSpray(x, y) {
    const density = currentSize * 2;
    const radius = currentSize * 2;
    ctx.fillStyle = currentColor;
    for (let i = 0; i < density; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * radius;
      ctx.beginPath();
      ctx.arc(x + r * Math.cos(angle), y + r * Math.sin(angle), Math.random() * 1.5 + 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawStamp(x, y) {
    const size = currentSize * 3 + 16;
    ctx.font = `${size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentStamp, x, y);
  }

  // Flood fill
  function floodFill(startX, startY, fillColor) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;

    // Parse fill color
    const fc = hexToRgb(fillColor);
    const startIdx = (startY * w + startX) * 4;
    const sr = data[startIdx], sg = data[startIdx+1], sb = data[startIdx+2], sa = data[startIdx+3];

    if (sr === fc.r && sg === fc.g && sb === fc.b) return;

    const tolerance = 30;
    function matches(i) {
      return Math.abs(data[i] - sr) <= tolerance &&
             Math.abs(data[i+1] - sg) <= tolerance &&
             Math.abs(data[i+2] - sb) <= tolerance &&
             Math.abs(data[i+3] - sa) <= tolerance;
    }

    const stack = [[startX, startY]];
    const visited = new Uint8Array(w * h);

    while (stack.length > 0) {
      const [x, y] = stack.pop();
      if (x < 0 || x >= w || y < 0 || y >= h) continue;
      const idx = y * w + x;
      if (visited[idx]) continue;
      const pi = idx * 4;
      if (!matches(pi)) continue;

      visited[idx] = 1;
      data[pi] = fc.r; data[pi+1] = fc.g; data[pi+2] = fc.b; data[pi+3] = 255;

      stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
    }
    ctx.putImageData(imageData, 0, 0);
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return {r, g, b};
  }

  // -- Sparkle effect --
  function spawnSparkle(e) {
    const t = e.touches ? e.touches[0] : e;
    const sparkles = ['✨','⭐','💫','🌟'];
    for (let i = 0; i < 3; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
      el.style.left = (t.clientX + (Math.random()-0.5)*40) + 'px';
      el.style.top = (t.clientY + (Math.random()-0.5)*40) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }
  }

  // -- Stamp picker --
  function buildStampPicker() {
    const grid = document.getElementById('stampGrid');
    grid.innerHTML = '';
    for (const [cat, items] of Object.entries(stamps)) {
      const label = document.createElement('div');
      label.className = 'cat-label';
      label.textContent = cat;
      grid.appendChild(label);
      items.forEach(s => {
        const el = document.createElement('div');
        el.className = 'stamp-item' + (s === currentStamp ? ' selected' : '');
        el.textContent = s;
        el.addEventListener('click', () => {
          currentStamp = s;
          document.querySelectorAll('.stamp-item').forEach(x => x.classList.remove('selected'));
          el.classList.add('selected');
          document.getElementById('stampPicker').classList.remove('show');
        });
        grid.appendChild(el);
      });
    }
  }

  // -- Background picker --
  function buildBgPicker() {
    const grid = document.getElementById('bgGrid');
    grid.innerHTML = '';
    backgrounds.forEach(bg => {
      const el = document.createElement('div');
      el.className = 'bg-option' + (bg === bgColor ? ' active' : '');
      el.style.background = bg;
      el.addEventListener('click', () => {
        saveUndo();
        // Replace old bg color with new
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const oldBg = hexToRgb(bgColor);
        const newBg = hexToRgb(bg);
        for (let i = 0; i < data.length; i += 4) {
          if (Math.abs(data[i]-oldBg.r) < 5 && Math.abs(data[i+1]-oldBg.g) < 5 && Math.abs(data[i+2]-oldBg.b) < 5) {
            data[i] = newBg.r; data[i+1] = newBg.g; data[i+2] = newBg.b;
          }
        }
        ctx.putImageData(imageData, 0, 0);
        bgColor = bg;
        document.getElementById('bgPicker').classList.remove('show');
      });
      grid.appendChild(el);
    });
  }

  // -- Wire up UI --
  // Tool buttons
  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tool = btn.dataset.tool;
      if (tool === 'stamp') {
        buildStampPicker();
        document.getElementById('stampPicker').classList.add('show');
      }
      currentTool = tool;
      document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Color buttons
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentColor = btn.dataset.color;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Switch to brush if on eraser
      if (currentTool === 'eraser') {
        currentTool = 'brush';
        document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tool="brush"]').classList.add('active');
      }
    });
  });

  // Size buttons
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSize = parseInt(btn.dataset.size);
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Action buttons
  document.querySelectorAll('.tool-btn[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const action = btn.dataset.action;
      if (action === 'undo') {
        if (undoStack.length > 0) {
          const imgData = undoStack.pop();
          const img = new Image();
          img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
          };
          img.src = imgData;
          updateUndoBadge();
        }
      } else if (action === 'clear') {
        saveUndo();
        redrawBg();
      } else if (action === 'bg') {
        buildBgPicker();
        document.getElementById('bgPicker').classList.add('show');
      } else if (action === 'save') {
        const link = document.createElement('a');
        link.download = 'TiFpaint-' + Date.now() + '.png';
        link.href = canvas.toDataURL();
        link.click();
        const flash = document.getElementById('saveFlash');
        flash.classList.add('show');
        setTimeout(() => flash.classList.remove('show'), 700);
      }
    });
  });

  // Close pickers on outside click
  document.getElementById('stampPicker').addEventListener('click', (e) => {
    if (e.target.id === 'stampPicker') e.target.classList.remove('show');
  });
  document.getElementById('bgPicker').addEventListener('click', (e) => {
    if (e.target.id === 'bgPicker') e.target.classList.remove('show');
  });

  // Canvas events
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', endDraw);
  canvas.addEventListener('touchcancel', endDraw);

  // Prevent scrolling on canvas
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // Resize
  window.addEventListener('resize', () => {
    // Save current drawing
    const saved = canvas.toDataURL();
    resizeCanvas();
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = saved;
  });

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      document.querySelector('[data-action="undo"]').click();
    }
  });

  // Init
  resizeCanvas();
  buildStampPicker();
})();
</script>
</body>
</html>
